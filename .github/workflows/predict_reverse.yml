name: Daily FTRL Reverse Signal

on:
  workflow_dispatch:

jobs:
  predict-reverse:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-predict-${{ hashFiles('requirements_predict.txt') }}
          restore-keys: ${{ runner.os }}-pip-predict-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements_predict.txt

      - name: Run reverse signal
        env:
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:   ${{ secrets.HF_DATASET_REPO }}
          HF_SOURCE_REPO:    ${{ secrets.HF_SOURCE_REPO }}
        run: python predict_reverse.py
