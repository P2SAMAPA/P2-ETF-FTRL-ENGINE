name: Train FTRL Reverse Equity Windows

on:
  workflow_dispatch:
    inputs:
      window:
        description: 'Window ID (1-14) or "all"'
        required: true
        default: 'all'
      skip_completed:
        description: 'Skip windows already trained today?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix:      ${{ steps.set-matrix.outputs.matrix }}
      has_pending: ${{ steps.set-matrix.outputs.has_pending }}
      completed:   ${{ steps.set-matrix.outputs.completed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install minimal deps for setup check
        run: pip install huggingface_hub

      - name: Determine windows to train
        id: set-matrix
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          INPUT="${{ github.event.inputs.window }}"
          SKIP="${{ github.event.inputs.skip_completed }}"

          if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
            python check_completed.py --suffix _equity --skip_completed "$SKIP" --reverse
          else
            echo "matrix=[$INPUT]" >> $GITHUB_OUTPUT
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "completed=[]" >> $GITHUB_OUTPUT
          fi

  train:
    needs: setup
    if: needs.setup.outputs.has_pending == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        window: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      HF_TOKEN:        ${{ secrets.HF_TOKEN }}
      HF_SOURCE_REPO:  ${{ secrets.HF_SOURCE_REPO }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      ASSET_GROUP:     "EQUITY"
      OMP_NUM_THREADS: 2
      MKL_NUM_THREADS: 2
      NUMEXPR_NUM_THREADS: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train reverse window ${{ matrix.window }}
        run: |
          mkdir -p /tmp/ftrl_reverse_results
          python train_reverse.py --window ${{ matrix.window }}

      - name: Upload outcome artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: equity-rev-outcome-window-${{ matrix.window }}
          path: /tmp/ftrl_reverse_results/reverse_window_${{ matrix.window < 10 && format('0{0}', matrix.window) || matrix.window }}_equity_outcome.json
          if-no-files-found: ignore
          retention-days: 7

  report:
    needs: [setup, train]
    if: always() && needs.setup.outputs.has_pending == 'true'
    runs-on: ubuntu-latest
    env:
      HF_TOKEN:        ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      ASSET_GROUP:     "EQUITY"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install huggingface_hub

      - name: Download all outcome artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: equity-rev-outcome-window-*
          path: /tmp/ftrl_reverse_results
          merge-multiple: true

      - name: Generate and push training status report
        run: python report_status.py --suffix _equity --reverse

      - name: Print summary
        if: always()
        run: |
          echo "=== Equity Reverse Training Run Complete ==="
          echo "Already completed (skipped): ${{ needs.setup.outputs.completed }}"
          cat /tmp/ftrl_reverse_results/reverse_training_status_equity.json 2>/dev/null || echo "No status file found"
